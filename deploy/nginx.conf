upstream fastapi_app {
    server 127.0.0.1:8000;
    keepalive 128;
}

# ─── HTTP → HTTPS Redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    server_name DOMAIN_PLACEHOLDER;

    # Let's Encrypt / Certbot ACME challenge path
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # All other traffic → redirect to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS (Main) ──────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name DOMAIN_PLACEHOLDER;

    # ── SSL Certificate (Certbot / Let's Encrypt) ─────────────────────────
    # Setup: sudo certbot --nginx -d DOMAIN_PLACEHOLDER
    ssl_certificate     /etc/letsencrypt/live/DOMAIN_PLACEHOLDER/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/DOMAIN_PLACEHOLDER/privkey.pem;

    # ── SSL Hardening ─────────────────────────────────────────────────────
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5:!RC4;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Security Headers ──────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    # ── Static Files (Cached) ─────────────────────────────────────────────
    location /static/ {
        alias /var/www/buykori-adsync/app/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── Proxy to FastAPI ──────────────────────────────────────────────────
    location / {
        proxy_pass http://fastapi_app;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering on;
        proxy_buffers 16 16k;
        proxy_buffer_size 32k;
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # Max upload size (for GeoLite DB updates or others if needed)
    client_max_body_size 100M;

    # Gzip Compression
    gzip on;
    gzip_comp_level 4;
    gzip_min_length 256;
    gzip_vary on;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
}
