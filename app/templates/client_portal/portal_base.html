<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title }} — Buykori AdSync</title>
  <meta name="description" content="Buykori AdSync Client Portal — Manage your server-side event delivery.">
  <link rel="stylesheet" href="/static/css/portal.css">
  <script>
    (function() {
      var savedTheme = localStorage.getItem('theme') || 'dark';
      if (savedTheme === 'light') {
        document.documentElement.classList.add('light-mode');
      }
    })();
  </script>
</head>
<body>
  <script>
    // Apply light-mode to body immediately if active
    if (localStorage.getItem('theme') === 'light') {
      document.body.classList.add('light-mode');
    }
  </script>
  <button class="hamburger" id="hamburger" onclick="toggleSidebar()" aria-label="Open menu">
    <span></span><span></span><span></span>
  </button>
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-mark">B</div>
      <div class="sidebar-logo-text">
        <strong>Buykori AdSync</strong>
        <small>Client Portal</small>
      </div>
    </div>
    <nav class="sidebar-menu">
      <span class="nav-section-label">Overview</span>
      <a class="nav-item {% if active_page == 'dashboard' %}active{% endif %}" href="/client/dashboard"><span class="nav-icon">📊</span> Dashboard</a>
      <a class="nav-item {% if active_page == 'analytics' %}active{% endif %}" href="/client/dashboard#analytics"><span class="nav-icon">📈</span> Analytics</a>
      <span class="nav-section-label">Events</span>
      <a class="nav-item {% if active_page == 'event-log' %}active{% endif %}" href="/client/dashboard#events"><span class="nav-icon">📋</span> Event Log</a>
      <a class="nav-item {% if active_page == 'delay-purchase' %}active{% endif %}" href="/client/dashboard#delay-purchase"><span class="nav-icon">⏳</span> Pending Purchases</a>
      <span class="nav-section-label">Tools</span>
      <a class="nav-item {% if active_page == 'campaign-builder' %}active{% endif %}" href="/client/dashboard#tools"><span class="nav-icon">🔗</span> Campaign Builder</a>
      <a class="nav-item {% if active_page == 'setup-guide' %}active{% endif %}" href="/client/dashboard#setup"><span class="nav-icon">⚙️</span> Setup Guide</a>
      <span class="nav-section-label">Account</span>
      <a class="nav-item nav-upgrade" onclick="alert('Coming soon. Please contact the admin for updates.')"><span class="nav-icon">⚡</span> Upgrade Plan</a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-card">
        <div class="user-avatar">U</div>
        <div class="user-info">
          <div class="user-name">{{ client.name }}</div>
          <div class="user-role">Store Owner</div>
        </div>
        <div class="user-status"></div>
      </div>
      <a href="/client/logout" class="nav-item" style="color:var(--danger); margin-bottom: 8px;"><span class="nav-icon">🚪</span> Logout</a>
      <button class="theme-toggle-btn" onclick="toggleTheme()" id="theme-toggle">
        <span class="theme-icon">☀️</span> <span class="theme-text">Light Mode</span>
      </button>
    </div>
  </aside>
  <main class="main-content">
    <header class="client-topbar">
      <div class="client-topbar-title">&#x26A1; Tracking Command Center</div>
      <div class="client-topbar-actions">
        <span class="status-pill">Production Ready</span>
        <a class="topbar-btn" href="/api/v1/plugin/download">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Download Plugin
        </a>
      </div>
    </header>
    <div class="content-wrapper">
      {% block content %}{% endblock %}
    </div>
  </main>
  <script>
    function toggleSidebar() {
      var sidebar = document.getElementById('sidebar');
      var overlay = document.getElementById('sidebar-overlay');
      sidebar.classList.toggle('open');
      overlay.classList.toggle('open');
    }
    function copyText(id) {
      var t = document.getElementById(id);
      var textToCopy = t.dataset.secret || t.innerText || t.value;
      navigator.clipboard.writeText(textToCopy);
      var eventTarget = event.target;
      var origText = eventTarget.innerText;
      eventTarget.innerText = 'Copied!';
      setTimeout(() => eventTarget.innerText = origText, 1500);
    }
    function escapeHtml(value) {
      return String(value == null ? '' : value).replace(/[&<>"']/g, function(ch) {
        return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch];
      });
    }
    function revealSecret(id) {
      var t = document.getElementById(id);
      if (!t || !t.dataset.secret) return;
      var hidden = t.dataset.hidden !== '0';
      t.innerText = hidden ? t.dataset.secret : t.dataset.masked;
      t.dataset.hidden = hidden ? '0' : '1';
    }
    function openInnerTab(evt, tabId) {
      var i, tc, tl;
      tc = document.getElementsByClassName('inner-tab-content');
      for (i = 0; i < tc.length; i++) { tc[i].className = tc[i].className.replace(' active', ''); }
      tl = document.getElementsByClassName('tab-btn');
      for (i = 0; i < tl.length; i++) { tl[i].className = tl[i].className.replace(' active', ''); }
      document.getElementById(tabId).className += ' active';
      evt.currentTarget.className += ' active';
    }
    function convertUTCToLocal() {
      document.querySelectorAll('.local-time[data-utc]').forEach(function(el) {
        var utc = el.getAttribute('data-utc');
        if (!utc) return;
        try {
          var d = new Date(utc);
          var opts = { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
          el.textContent = d.toLocaleString('en-GB', opts).replace(',', '');
        } catch(e) {}
      });
    }
    document.addEventListener('DOMContentLoaded', convertUTCToLocal);

    function handleHashChange() {
      var hash = window.location.hash || '#dashboard';
      var tabMap = {
        '#dashboard': 'tab-dashboard',
        '#analytics': 'tab-analytics',
        '#events': 'tab-event-log',
        '#delay-purchase': 'tab-delay-purchase',
        '#tools': 'tab-settings',
        '#setup': 'tab-settings',
        '#settings': 'tab-settings'
      };

      var targetTabId = tabMap[hash] || 'tab-dashboard';

      var panes = document.querySelectorAll('.tab-pane');
      if (panes.length > 0) {
        panes.forEach(function(pane) {
          pane.classList.toggle('active', pane.id === targetTabId);
        });
      }

      document.querySelectorAll('.sidebar-menu .nav-item').forEach(function(item) {
        var href = item.getAttribute('href') || '';
        var isSetupOrSettings = (hash === '#setup' || hash === '#settings') && href.endsWith('#setup');
        var isActive = (hash === '#dashboard' && href === '/client/dashboard') ||
                       (href.endsWith(hash) && hash !== '#dashboard') ||
                       isSetupOrSettings;
        item.classList.toggle('active', isActive);
      });

      if (hash === '#setup') {
        var btn = document.querySelector('.tab-btn[onclick*="tab-wp"]');
        if (btn) btn.click();
      } else if (hash === '#tools' || hash === '#settings') {
        var btn = document.querySelector('.tab-btn[onclick*="tab-easy"]');
        if (btn) btn.click();
      }
    }

    window.addEventListener('hashchange', handleHashChange);
    document.addEventListener('DOMContentLoaded', handleHashChange);

    // Theme toggle function
    function toggleTheme() {
      var isLight = document.body.classList.toggle('light-mode');
      document.documentElement.classList.toggle('light-mode', isLight);
      localStorage.setItem('theme', isLight ? 'light' : 'dark');
      updateThemeButton(isLight);
    }

    function updateThemeButton(isLight) {
      var btn = document.getElementById('theme-toggle');
      if (!btn) return;
      var icon = btn.querySelector('.theme-icon');
      var text = btn.querySelector('.theme-text');
      if (isLight) {
        icon.textContent = '🌙';
        text.textContent = 'Dark Mode';
      } else {
        icon.textContent = '☀️';
        text.textContent = 'Light Mode';
      }
    }

    // Sync button text on load
    document.addEventListener('DOMContentLoaded', function() {
      var isLight = document.body.classList.contains('light-mode');
      updateThemeButton(isLight);
    });
  </script>
</body>
</html>
